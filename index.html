<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>Chatro</title>
    <style>
        :root{--wa-bg:#0b141a;--wa-teal:#556b2f;--wa-teal-hover:#3b4d24;--wa-header:#232d16;--wa-sidebar-bg:#111b21;--wa-bubble-sent:#3b4d24;--wa-bubble-received:#202c33;--wa-text-main:#e9edef;--wa-text-muted:#8696a0;--wa-input-bg:#2a3942;--modal-bg:rgba(11,20,26,0.85)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
        body,html{width:100%;height:100%;min-height:100dvh;overflow:hidden;background:var(--wa-bg);color:var(--wa-text-main)}
        .auth-overlay{position:fixed;top:0;left:0;width:100vw;height:100dvh;background:var(--wa-bg);display:flex;align-items:center;justify-content:center;z-index:9999}
        .auth-card{background:var(--wa-sidebar-bg);padding:30px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.5);width:100%;max-width:400px;text-align:center;border:1px solid rgba(255,255,255,.05)}
        .auth-card h2{color:var(--wa-teal);margin-bottom:8px}
        .auth-card p{color:var(--wa-text-muted);font-size:.9rem;margin-bottom:20px}
        .auth-form-group{margin-bottom:15px;text-align:left}
        .auth-form-group label{display:block;font-size:.85rem;margin-bottom:6px}
        .auth-form-group input{width:100%;padding:12px;border-radius:10px;outline:none;font-size:1rem;border:1px solid var(--wa-input-bg);background:var(--wa-input-bg);color:var(--wa-text-main)}
        .auth-form-group input:focus{border-color:var(--wa-teal);background:rgba(42,57,66,.8)}
        .auth-btn{background:var(--wa-teal);color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer;width:100%;padding:12px;font-size:1rem;margin-top:10px}
        .auth-btn:hover{background:var(--wa-teal-hover)}.auth-btn:disabled{background:#2d3b1c;color:rgba(255,255,255,.5);cursor:not-allowed}
        .auth-toggle{margin-top:20px;font-size:.9rem;color:var(--wa-text-muted)}.auth-toggle span{color:var(--wa-teal);font-weight:bold;cursor:pointer}
        .auth-error{background:rgba(198,40,40,.2);color:#ff8a80;padding:12px;border-radius:8px;font-size:.85rem;margin-top:15px;display:none;border-left:4px solid #c62828;text-align:left}
        .app-container{display:none;width:100vw;height:100dvh;position:relative}
        .screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow:hidden}
        #contacts-screen{background:var(--wa-sidebar-bg);z-index:10}#contacts-screen.active{display:flex}
        #chat-screen{background:var(--wa-bg);z-index:20}#chat-screen.active{display:flex}
        #chat-screen::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;opacity:.12;background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');filter:invert(1);pointer-events:none}
        .screen-header{background:var(--wa-header);color:var(--wa-text-main);display:flex;align-items:center;justify-content:space-between;padding:10px 16px;height:60px;flex-shrink:0;box-shadow:0 2px 4px rgba(0,0,0,.2);z-index:5}
        .user-profile{display:flex;align-items:center;gap:10px;font-size:.95rem;font-weight:600}
        .logout-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--wa-text-muted);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.85rem}
        .logout-btn:hover{color:#ff8a80;border-color:#ff8a80}
        .delete-account-btn{background:transparent;border:none;color:#ff8a80;font-size:.8rem;cursor:pointer;text-decoration:underline;margin-top:5px;display:block}
        .chat-list{flex:1;overflow-y:auto;background:var(--wa-sidebar-bg)}
        .chat-item{display:flex;align-items:center;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);position:relative}
        .chat-item:hover{background:rgba(255,255,255,.03)}
        .avatar{width:40px;height:40px;border-radius:50%;background:#4f5d64;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:15px;flex-shrink:0;user-select:none}
        .chat-info{flex:1;overflow:hidden}.chat-name{font-weight:600;font-size:1.05rem}
        .chat-last-msg{font-size:.85rem;color:var(--wa-text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .badge-unread{position:absolute;right:16px;background:var(--wa-teal);color:#fff;font-size:0.75rem;font-weight:bold;padding:2px 6px;border-radius:20px;display:none}
        .header-left{display:flex;align-items:center;gap:10px;overflow:hidden}
        .back-btn{background:transparent;border:none;font-size:1.5rem;color:var(--wa-text-muted);cursor:pointer;padding:4px}
        .menu-container{position:relative;z-index:10}
        .menu-btn{width:40px;height:40px;border:none;background:transparent;color:var(--wa-text-muted);font-size:22px;cursor:pointer}
        .dropdown-menu{position:absolute;top:45px;right:0;background:var(--wa-header);width:240px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5);overflow:hidden;display:none;padding:5px 0;border:1px solid rgba(255,255,255,.05)}
        .dropdown-menu.active{display:block}
        .menu-item{padding:12px 20px;cursor:pointer;font-size:.9rem}.menu-item:hover{background:var(--wa-input-bg)}
        .menu-danger{color:#ff8a80}
        .messages-window{flex:1;padding:15px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;z-index:1;-webkit-overflow-scrolling:touch}
        .message{max-width:80%;padding:8px 12px;border-radius:8px;font-size:.95rem;line-height:1.4;word-wrap:break-word;box-shadow:0 1px 1px rgba(0,0,0,.2);position:relative}
        .message.sent{background:var(--wa-bubble-sent);align-self:flex-end;border-top-right-radius:0}
        .message.received{background:var(--wa-bubble-received);align-self:flex-start;border-top-left-radius:0}
        .message.selected{background:rgba(85,107,47,.3)!important}
        .message-meta{display:inline-flex;align-items:center;float:right;margin:4px 0 -4px 8px;position:relative;bottom:-2px}
        .message-time{font-size:.7rem;color:var(--wa-text-muted)}
        .input-area{padding:12px;background:var(--wa-header);display:flex;align-items:center;gap:10px;z-index:5;box-shadow:0 -1px 4px rgba(0,0,0,.2)}
        .input-area input{flex:1;border:none;padding:12px;border-radius:10px;background:var(--wa-input-bg);color:var(--wa-text-main);font-size:1rem;outline:none}
        .send-btn{background:var(--wa-teal);color:#fff;border:none;font-weight:700;cursor:pointer;padding:12px 18px;border-radius:10px}
        .custom-modal{position:fixed;top:0;left:0;width:100vw;height:100dvh;background:var(--modal-bg);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px;opacity:0;transition:opacity .2s}
        .custom-modal.active{display:flex;opacity:1}.modal-box{background:var(--wa-sidebar-bg);border:1px solid rgba(255,255,255,0.08);border-radius:16px;width:100%;max-width:380px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
        .modal-title{font-size:1.15rem;font-weight:700;margin-bottom:12px}
        .modal-text{font-size:0.95rem;color:var(--wa-text-muted);line-height:1.4;margin-bottom:24px}
        .modal-buttons{display:flex;justify-content:flex-end;gap:12px}
        .modal-btn{padding:10px 16px;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none}
        .modal-btn-secondary{background:transparent;color:var(--wa-text-muted);border:1px solid rgba(255,255,255,0.15)}
        .modal-btn-primary{background:var(--wa-teal);color:#fff}
        .modal-btn-danger{background:#d32f2f;color:#fff}
        @media(max-width:480px){.auth-card{margin:12px;padding:24px 16px}.message{max-width:85%}}
    </style>
</head>
<body>
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Entrar no Chatro</h2><p>Insira suas credenciais para acessar</p>
            <div class="auth-form-group" id="name-group" style="display:none"><label>Seu Nome / Apelido</label><input type="text" id="auth-name" placeholder="Ex: João Silva"></div>
            <div class="auth-form-group"><label>E-mail</label><input type="email" id="auth-email" placeholder="seuemail@provedor.com"></div>
            <div class="auth-form-group"><label>Senha</label><input type="password" id="auth-password" placeholder="******"></div>
            <div class="auth-error" id="auth-error"></div><button class="auth-btn" id="auth-submit-btn">Entrar</button>
            <div class="auth-toggle"><span id="auth-toggle-text">Não tem uma conta? Cadastre-se</span></div>
        </div>
    </div>
    <div class="app-container" id="app-container">
        <section class="screen active" id="contacts-screen">
            <header class="screen-header">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar" style="width:35px;height:35px;font-size:0.9rem;margin-right:5px;background:var(--wa-teal)">U</div>
                    <div>
                        <span id="user-display-name">Carregando...</span>
                        <button class="delete-account-btn" id="delete-account-button">Excluir minha conta</button>
                    </div>
                </div>
                <button class="logout-btn" id="logout-button">Sair</button>
            </header>
            <div class="chat-list" id="chat-list"></div>
        </section>
        <section class="screen" id="chat-screen">
            <header class="screen-header">
                <div class="header-left"><button class="back-btn" id="back-button">←</button><div class="avatar" id="current-chat-avatar" style="width:38px;height:38px;font-size:1rem;margin-right:0;background:var(--wa-teal)">?</div><div class="chat-name" id="current-chat-name">Conversa</div></div>
                <div class="menu-container"><button class="menu-btn" id="menu-btn">⋮</button>
                    <div class="dropdown-menu" id="dropdown-menu">
                        <div class="menu-item" id="delete-selected-btn">Apagar do meu visor</div>
                        <div class="menu-item" id="clear-chat-local-btn">Limpar apenas para mim</div>
                        <div class="menu-item menu-danger" id="clear-chat-btn">Apagar tudo por completo (Banco)</div>
                    </div>
                </div>
            </header>
            <div class="messages-window" id="messages-window"></div>
            <div class="input-area"><input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off"><button class="send-btn" id="send-button">Enviar</button></div>
        </section>
    </div>
    <div class="custom-modal" id="custom-modal"><div class="modal-box"><div class="modal-title" id="modal-title">Aviso</div><div class="modal-text" id="modal-text"></div><div class="modal-buttons" id="modal-buttons"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVTpFoYGWPk9_QJOz8_ZP9-pn6DYPOEao", authDomain: "chatro-e591c.firebaseapp.com",
            projectId: "chatro-e591c", storageBucket: "chatro-e591c.appspot.com",
            messagingSenderId: "619166274157", appId: "1:619166274157:web:35f8210256dbd73d58e564"
        };

        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
        const authOverlay = document.getElementById('auth-overlay'), appContainer = document.getElementById('app-container'), contactsScreen = document.getElementById('contacts-screen'), chatScreen = document.getElementById('chat-screen'), chatList = document.getElementById('chat-list'), messagesWindow = document.getElementById('messages-window'), messageInput = document.getElementById('message-input'), sendButton = document.getElementById('send-button'), logoutButton = document.getElementById('logout-button'), backButton = document.getElementById('back-button'), currentChatName = document.getElementById('current-chat-name'), currentChatAvatar = document.getElementById('current-chat-avatar'), menuBtn = document.getElementById('menu-btn'), dropdownMenu = document.getElementById('dropdown-menu'), deleteSelectedBtn = document.getElementById('delete-selected-btn'), clearChatLocalBtn = document.getElementById('clear-chat-local-btn'), clearChatBtn = document.getElementById('clear-chat-btn'), authTitle = document.getElementById('auth-title'), nameGroup = document.getElementById('name-group'), authEmail = document.getElementById('auth-email'), authPassword = document.getElementById('auth-password'), authName = document.getElementById('auth-name'), authSubmitBtn = document.getElementById('auth-submit-btn'), authToggleText = document.getElementById('auth-toggle-text'), authError = document.getElementById('auth-error'), userAvatar = document.getElementById('user-avatar'), userDisplayName = document.getElementById('user-display-name'), cModal = document.getElementById('custom-modal'), mTitle = document.getElementById('modal-title'), mText = document.getElementById('modal-text'), mButtons = document.getElementById('modal-buttons'), deleteAccountButton = document.getElementById('delete-account-button');

        let isLoginMode = true, currentUser = null, activeChatUser = null, unsubscribeSnapshot = null, unsubscribeUsers = null, selectedMessageElement = null;
        let globalActiveRooms = {}, initialRoomLoads = {};

        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function sendSystemNotification(title, messageBody) {
            if ("Notification" in window && Notification.permission === "granted") {
                try { new Notification(title, { body: messageBody }); } catch(e) {}
            }
        }

        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.22);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.22);
            } catch(e) {}
        }

        let alertInterval = null;
        function triggerVisualAlert() {
            if (alertInterval) clearInterval(alertInterval);
            let originalTitle = document.title, isAlert = false;
            alertInterval = setInterval(() => { document.title = isAlert ? `🔔 Nova Mensagem!` : originalTitle; isAlert = !isAlert; }, 800);
            window.onfocus = window.onclick = window.onkeydown = () => { clearInterval(alertInterval); alertInterval = null; document.title = originalTitle; };
        }
        function openModal(title, text, buttons) {
            mTitle.innerText = title; mText.innerText = text; mButtons.innerHTML = "";
            buttons.forEach(btn => {
                const el = document.createElement("button"); el.className = `modal-btn ${btn.class}`; el.innerText = btn.text;
                el.onclick = () => { cModal.classList.remove("active"); if(btn.action) btn.action(); }; mButtons.appendChild(el);
            });
            cModal.classList.add("active");
        }

        menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle("active"); };
        document.onclick = (e) => { if(!e.target.closest(".menu-container")) dropdownMenu.classList.remove("active"); };

        deleteSelectedBtn.onclick = async () => {
            if (!selectedMessageElement) { openModal("Seleção Necessária", "Por favor, selecione uma mensagem clicando longo nela primeiro.", [{ text: "Entendido", class: "modal-btn-primary" }]); return; }
            const msgId = selectedMessageElement.getAttribute("data-id");
            if (msgId && currentUser && activeChatUser) {
                const roomId = getChatRoomId(currentUser.uid, activeChatUser.uid);
                try { await deleteDoc(doc(db, "direct_messages", roomId, "messages", msgId)); selectedMessageElement = null; } catch (err) { console.error(err); }
            }
            dropdownMenu.classList.remove("active");
        };

        clearChatLocalBtn.onclick = () => {
            if (activeChatUser && currentUser) {
                openModal("Limpar Conversa", "Ocultar as mensagens atuais da sua tela? O outro usuário continuará vendo.", [
                    { text: "Cancelar", class: "modal-btn-secondary" },
                    { text: "Limpar para mim", class: "modal-btn-primary", action: () => {
                        const roomId = getChatRoomId(currentUser.uid, activeChatUser.uid);
                        localStorage.setItem("clear_marker_" + currentUser.uid + "_" + roomId, Date.now().toString()); messagesWindow.innerHTML = ""; selectedMessageElement = null;
                    }}
                ]);
            }
            dropdownMenu.classList.remove("active");
        };

        clearChatBtn.onclick = async () => {
            if (activeChatUser && currentUser) {
                openModal("Apagar para Todos", "Apagar permanentemente todas as mensagens desta conversa para ambos no servidor?", [
                    { text: "Cancelar", class: "modal-btn-secondary" },
                    { text: "Apagar tudo", class: "modal-btn-danger", action: async () => {
                        const roomId = getChatRoomId(currentUser.uid, activeChatUser.uid); localStorage.removeItem("clear_marker_" + currentUser.uid + "_" + roomId);
                        try {
                            const snap = await getDocs(collection(db, "direct_messages", roomId, "messages"));
                            for (const dRef of snap.docs) { await deleteDoc(doc(db, "direct_messages", roomId, "messages", dRef.id)); }
                            messagesWindow.innerHTML = ""; selectedMessageElement = null;
                        } catch (err) { console.error(err); }
                    }}
                ]);
            }
            dropdownMenu.classList.remove("active");
        };

        deleteAccountButton.onclick = () => {
            if (currentUser) {
                openModal("Excluir Conta", "Tem certeza absoluta? Isso apagará seu perfil do banco de dados e removerá seu login. Essa ação não pode ser desfeita.", [
                    { text: "Cancelar", class: "modal-btn-secondary" },
                    { text: "Excluir permanentemente", class: "modal-btn-danger", action: async () => {
                        try {
                            const userUid = currentUser.uid; await deleteDoc(doc(db, "users", userUid)); await deleteUser(currentUser);
                        } catch (err) {
                            if (err.code === "auth/requires-recent-login") {
                                openModal("Segurança", "Para realizar essa operação crítica, você precisa fazer login novamente antes.", [{ text: "Entendido", class: "modal-btn-primary", action: () => signOut(auth) }]);
                            } else { openModal("Erro", "Não foi possível excluir a conta.", [{ text: "Ok", class: "modal-btn-primary" }]); }
                        }
                    }}
                ]);
            }
        };

        authToggleText.onclick = () => {
            isLoginMode = !isLoginMode; authError.style.display = "none";
            if (isLoginMode) { authTitle.innerText = "Entrar no Chatro"; nameGroup.style.display = "none"; authSubmitBtn.innerText = "Entrar"; authToggleText.innerText = "Não tem uma conta? Cadastre-se"; }
            else { authTitle.innerText = "Criar Nova Conta"; nameGroup.style.display = "block"; authSubmitBtn.innerText = "Cadastrar"; authToggleText.innerText = "Já possui uma conta? Faça Login"; }
        };

        function showError(e) { authError.innerText = e; authError.style.display = "block"; authSubmitBtn.disabled = false; authSubmitBtn.innerText = isLoginMode ? "Entrar" : "Cadastrar"; }
        function translateError(e) {
            switch(e){
                case "auth/invalid-credential": case "auth/user-not-found": case "auth/wrong-password": return "E-mail ou senha incorretos.";
                case "auth/email-already-in-use": return "Este e-mail já está em uso.";
                case "auth/weak-password": return "A senha deve ter pelo menos 6 dígitos.";
                case "auth/invalid-email": return "Formato de e-mail inválido.";
                default: return "Ocorreu um erro. Tente novamente.";
            }
        }

        authSubmitBtn.onclick = async () => {
            const email = authEmail.value.trim(), pass = authPassword.value, name = authName.value.trim();
            authError.style.display = "none"; if (!email || !pass || (!isLoginMode && !name)) return showError("Por favor, preencha todos os campos.");
            authSubmitBtn.disabled = true; authSubmitBtn.innerText = isLoginMode ? "Entrando..." : "Cadastrando...";
            try {
                if (isLoginMode) { await signInWithEmailAndPassword(auth, email, pass); }
                else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass); await updateProfile(res.user, { displayName: name });
                    await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, name: name, email: email }); currentUser = auth.currentUser; setupUserHeader();
                }
                authEmail.value = ""; authPassword.value = ""; authName.value = "";
            } catch (err) { showError(translateError(err.code)); }
        };

        function setupUserHeader() {
            if (currentUser) {
                const name = currentUser.displayName || currentUser.email.split("@")[0]; userDisplayName.innerText = name; userAvatar.innerText = name.substring(0, 2).toUpperCase();
                setDoc(doc(db, "users", currentUser.uid), { uid: currentUser.uid, name: name, email: currentUser.email }, { merge: true });
            }
        }

        onAuthStateChanged(auth, user => {
            if (user) { currentUser = user; setupUserHeader(); authOverlay.style.display = "none"; appContainer.style.display = "block"; navigateToScreen("contacts"); startUsersListener(); requestNotificationPermission(); }
            else {
                currentUser = null; activeChatUser = null; appContainer.style.display = "none"; authOverlay.style.display = "flex"; authSubmitBtn.disabled = false; authSubmitBtn.innerText = isLoginMode ? "Entrar" : "Cadastrar";
                if(unsubscribeSnapshot) unsubscribeSnapshot(); if(unsubscribeUsers) unsubscribeUsers(); Object.values(globalActiveRooms).forEach(unsub => unsub()); globalActiveRooms = {}; initialRoomLoads = {}; messagesWindow.innerHTML = ""; chatList.innerHTML = "";
            }
        });

        logoutButton.onclick = () => signOut(auth); backButton.onclick = () => { activeChatUser = null; navigateToScreen("contacts"); };
        function navigateToScreen(scr) { if (scr === "contacts") { chatScreen.classList.remove("active"); contactsScreen.classList.add("active"); } else { contactsScreen.classList.remove("active"); chatScreen.classList.add("active"); } }

        function startUsersListener() {
            const q = query(collection(db, "users"));
            unsubscribeUsers = onSnapshot(q, snap => {
                chatList.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    if (u.uid !== currentUser.uid) {
                        const item = document.createElement("div"); item.classList.add("chat-item"); const initial = u.name ? u.name.substring(0, 2).toUpperCase() : "U";
                        item.setAttribute("id", "user-item-" + u.uid);
                        item.innerHTML = `<div class="avatar">${initial}</div><div class="chat-info"><div class="chat-name">${u.name || "Usuário"}</div><div class="chat-last-msg" id="last-msg-text-${u.uid}">Toque para abrir a conversa</div></div><div class="badge-unread" id="badge-unread-${u.uid}">1</div>`;
                        item.onclick = () => selectChat(u); chatList.appendChild(item);
                        
                        // Executa a escuta individual de forma totalmente segura
                        setTimeout(() => { listenToBackgroundRoom(u); }, 50);
                    }
                });
            });
        }

        // Sistema Protetor: Monitora novas mensagens em tempo real para o RECEPTOR
        function listenToBackgroundRoom(targetUser) {
            const roomId = getChatRoomId(currentUser.uid, targetUser.uid);
            if (globalActiveRooms[roomId]) return; 

            const q = query(collection(db, "direct_messages", roomId, "messages"), orderBy("timestamp", "asc"));
            initialRoomLoads[roomId] = false;

            globalActiveRooms[roomId] = onSnapshot(q, snap => {
                let lastMessageData = null;
                snap.forEach(d => { lastMessageData = d.data(); });

                if (lastMessageData) {
                    const label = document.getElementById(`last-msg-text-${targetUser.uid}`);
                    if (label) label.innerText = lastMessageData.text;

                    // Gatilho do receptor: Executa os avisos imediatos se a mensagem for nova e não for do próprio usuário
                    if (initialRoomLoads[roomId] && lastMessageData.senderId !== currentUser.uid) {
                        // Verifica se o receptor NÃO está com o chat deste remetente aberto na tela
                        if (!activeChatUser || activeChatUser.uid !== targetUser.uid) {
                            playNotificationSound();
                            triggerVisualAlert();
                            sendSystemNotification(`Mensagem de ${targetUser.name}`, lastMessageData.text);
                            
                            const badge = document.getElementById(`badge-unread-${targetUser.uid}`);
                            if (badge) badge.style.display = "block";
                        }
                    }
                }
                initialRoomLoads[roomId] = true;
            }, err => {
                // Impede travamentos: se o nó de mensagens ainda não existir no Firebase, o app ignora o erro e continua rodando
                initialRoomLoads[roomId] = true;
            });
        }

        function selectChat(user) { 
            activeChatUser = user; 
            currentChatName.innerText = user.name; 
            currentChatAvatar.innerText = user.name.substring(0, 2).toUpperCase(); 
            
            const badge = document.getElementById(`badge-unread-${user.uid}`);
            if (badge) badge.style.display = "none";
            
            navigateToScreen("chat"); 
            startChatListener(); 
        }
        
        function getChatRoomId(a, b) { return a < b ? `${a}_${b}` : `${b}_${a}`; }

        function startChatListener() {
            if (activeChatUser && currentUser) {
                const roomId = getChatRoomId(currentUser.uid, activeChatUser.uid), q = query(collection(db, "direct_messages", roomId, "messages"), orderBy("timestamp", "asc"));
                if(unsubscribeSnapshot) unsubscribeSnapshot();
                
                let localFirstLoad = false;
                unsubscribeSnapshot = onSnapshot(q, snap => {
                    messagesWindow.innerHTML = ""; const marker = localStorage.getItem("clear_marker_" + currentUser.uid + "_" + roomId), timeLimit = marker ? parseInt(marker, 10) : 0;
                    let incomingNew = false;
                    
                    snap.forEach(d => {
                        const msg = d.data(); if (msg.timestamp) { if (msg.timestamp.toDate().getTime() <= timeLimit) return; } else if (timeLimit > 0) return;
                        const box = document.createElement("div"); box.classList.add("message"); box.setAttribute("data-id", d.id); box.classList.add(msg.senderId === currentUser.uid ? "sent" : "received");
                        
                        if (msg.senderId !== currentUser.uid) incomingNew = true;
                        
                        let tOut; const selectFn = () => { document.querySelectorAll(".message").forEach(m => m.classList.remove("selected")); box.classList.add("selected"); selectedMessageElement = box; };
                        box.addEventListener("touchstart", () => tOut = setTimeout(selectFn, 600)); box.addEventListener("touchend", () => clearTimeout(tOut)); box.addEventListener("contextmenu", e => { e.preventDefault(); selectFn(); });
                        box.appendChild(document.createTextNode(msg.text)); const meta = document.createElement("span"); meta.className = "message-meta"; const time = document.createElement("span"); time.className = "message-time";
                        time.innerText = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }) : "...";
                        meta.appendChild(time); box.appendChild(meta); messagesWindow.appendChild(box);
                    });
                    
                    if (incomingNew && localFirstLoad) { playNotificationSound(); triggerVisualAlert(); }
                    localFirstLoad = true; messagesWindow.scrollTop = messagesWindow.scrollHeight;
                }, err => {});
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "" && currentUser && activeChatUser) {
                const cache = text; messageInput.value = ""; const roomId = getChatRoomId(currentUser.uid, activeChatUser.uid);
                try { await addDoc(collection(db, "direct_messages", roomId, "messages"), { text: cache, senderId: currentUser.uid, senderName: currentUser.displayName || currentUser.email.split("@")[0], timestamp: serverTimestamp() }); } 
                catch (err) { console.error(err); messageInput.value = cache; }
            }
        }
        sendButton.onclick = sendMessage; messageInput.addEventListener("keydown", e => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
